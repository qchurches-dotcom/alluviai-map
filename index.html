<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#121621"/>
<title>AlluviAI — Tipperary Gully</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,sans-serif}
  #map{position:absolute;inset:0}
  .panel{position:absolute;z-index:1000;background:rgba(20,20,24,.84);color:#fff;
    padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.45}
  #title{top:10px;left:10px;max-width:62vw}
  #title b{font-size:15px}
  #legend{bottom:10px;left:10px}
  #logbar{bottom:10px;right:10px;text-align:center}
  #gps{top:10px;right:10px;cursor:pointer;text-align:center}
  .bar{height:10px;width:150px;border-radius:5px;margin:4px 0;
    background:linear-gradient(90deg,#1a80e6,#ffd900,#ff7300,#d80000)}
  .row{display:flex;justify-content:space-between;font-size:11px;opacity:.85}
  #op{width:120px;vertical-align:middle}
  #status,#nearest,#offline{font-size:12px;margin-top:4px}
  .btn{display:inline-block;margin:4px 2px 0;padding:6px 10px;border:0;border-radius:8px;
    background:#2d6cdf;color:#fff;font-size:13px;cursor:pointer}
  .wp .pin{width:24px;height:24px;border-radius:50%;background:#d80000;color:#fff;
    border:2px solid #fff;font-size:13px;font-weight:700;text-align:center;
    line-height:22px;box-shadow:0 1px 4px rgba(0,0,0,.5)}
  .modal{position:absolute;inset:0;z-index:2000;background:rgba(0,0,0,.55);display:none}
  .card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    background:#1b1b20;color:#fff;padding:18px 20px;border-radius:14px;width:280px;
    box-shadow:0 6px 24px rgba(0,0,0,.6)}
  .card b{font-size:16px}
  .muted{font-size:11px;opacity:.7;margin:6px 0 10px}
  .outs button{width:100%;margin:5px 0;padding:11px;border:0;border-radius:9px;
    font-size:15px;font-weight:600;cursor:pointer;color:#fff}
  .card input{width:100%;box-sizing:border-box;margin:5px 0;padding:9px;border-radius:8px;
    border:1px solid #444;background:#26262c;color:#fff;font-size:14px}
  .card a{color:#9bd;font-size:13px}
  #arrow{display:inline-block;font-size:20px;transition:transform .2s;transform-origin:50% 50%}
  #listPanel{top:50%;left:50%;transform:translate(-50%,-50%);max-height:60vh;width:260px;
    overflow:auto;display:none;z-index:2000}
  #listItems div{padding:5px 0;border-bottom:1px solid #333;font-size:12px;
    display:flex;justify-content:space-between;gap:8px}
  #listItems a{color:#f88;text-decoration:none}
</style>
</head>
<body>
<div id="map"></div>

<div id="title" class="panel">
  <b>AlluviAI</b> — Tipperary Gully<br>
  Predicted gold-deposition prospectivity<br>
  <label>Overlay <input id="op" type="range" min="0" max="100" value="55"></label>
  <div id="nearest"><span id="ntext">Nearest spot: —</span> <span id="arrow"></span></div>
  <div id="status">Locating…</div>
  <button class="btn" style="background:#1f7a44" onclick="saveArea()">⤓ Save area offline</button>
  <button id="compassBtn" class="btn" style="background:#555" onclick="enableCompass()">🧭 Compass</button>
  <div id="offline"></div>
</div>

<div id="gps" class="panel">📍<br>Recenter</div>

<div id="legend" class="panel">
  Prospectivity
  <div class="bar"></div>
  <div class="row"><span>lower</span><span>top traps</span></div>
  <div style="font-size:11px;opacity:.7;margin-top:4px">physics × geology · qualitative</div>
</div>

<div id="logbar" class="panel">
  Finds: <b id="cnt">0</b><br>
  <button class="btn" onclick="openLog()">＋ Log find</button>
  <button class="btn" style="background:#444" onclick="toggleList()">≣ List</button>
  <button class="btn" style="background:#444" onclick="exportCSV()">⬇ CSV</button>
</div>

<div id="listPanel" class="panel">
  <b>Logged finds</b> <a href="#" style="float:right;color:#9bd" onclick="toggleList();return false">close</a>
  <div id="listItems"></div>
</div>

<div id="modal" class="modal">
  <div class="card">
    <b>Log a find</b>
    <div id="logwhere" class="muted"></div>
    <div class="outs">
      <button onclick="saveLog('None')"    style="background:#777">Nothing</button>
      <button onclick="saveLog('Colours')" style="background:#2ecc40">Colours</button>
      <button onclick="saveLog('Flakes')"  style="background:#1f9e3a">Flakes</button>
      <button onclick="saveLog('Nugget')"  style="background:#e6b800;color:#000">Nugget</button>
    </div>
    <input id="pans" type="number" inputmode="numeric" placeholder="pans worked (optional)">
    <input id="notes" type="text" placeholder="notes (optional)">
    <div><a href="#" onclick="closeLog();return false">cancel</a></div>
  </div>
</div>

function haversine(a,b,c,d){const R=6371000,t=Math.PI/180,dla=(c-a)*t,dlo=(d-b)*t;
  const x=Math.sin(dla/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(dlo/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));}
function bearing(a,b,c,d){const t=Math.PI/180,y=Math.sin((d-b)*t)*Math.cos(c*t);
  const x=Math.cos(a*t)*Math.sin(c*t)-Math.sin(a*t)*Math.cos(c*t)*Math.cos((d-b)*t);
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(((Math.atan2(y,x)/t)+360)%360/45)%8];}
function bearingDeg(a,b,c,d){const t=Math.PI/180,y=Math.sin((d-b)*t)*Math.cos(c*t);
  const x=Math.cos(a*t)*Math.sin(c*t)-Math.sin(a*t)*Math.cos(c*t)*Math.cos((d-b)*t);
  return (Math.atan2(y,x)/t+360)%360;}
function nearestPeak(lat,lon){let best=null,bd=1e12;
  PEAKS.forEach(p=>{const d=haversine(lat,lon,p.lat,p.lon);if(d<bd){bd=d;best=p;}});
  return {p:best,d:bd};}
function updateNearest(lat,lon){if(!PEAKS.length)return;const r=nearestPeak(lat,lon);
  bearingToSpot=bearingDeg(lat,lon,r.p.lat,r.p.lon); applyArrow();
  document.getElementById('ntext').innerHTML='Nearest spot: <b>#'+r.p.n+'</b> · '
    +Math.round(r.d)+' m '+bearing(lat,lon,r.p.lat,r.p.lon);}

// ---- compass: rotate an arrow toward the nearest spot ----
let heading=null, bearingToSpot=null;
function applyArrow(){const el=document.getElementById('arrow');if(!el)return;
  if(heading==null||bearingToSpot==null){el.textContent='';return;}
  el.textContent='↑'; el.style.transform='rotate('+((bearingToSpot-heading+360)%360)+'deg)';}
function onOrient(ev){
  let h=(ev.webkitCompassHeading!=null)?ev.webkitCompassHeading:(ev.alpha!=null?360-ev.alpha:null);
  if(h!=null){heading=h; applyArrow();}}
function enableCompass(){
  const D=window.DeviceOrientationEvent;
  if(D&&typeof D.requestPermission==='function'){
    D.requestPermission().then(s=>{if(s==='granted')window.addEventListener('deviceorientation',onOrient,true);}).catch(()=>{});
  } else {window.addEventListener('deviceorientationabsolute',onOrient,true);
          window.addEventListener('deviceorientation',onOrient,true);}
  const b=document.getElementById('compassBtn'); if(b)b.style.display='none';}

let me=null, accCircle=null, accM=0, first=true;
const status=document.getElementById('status');
function onPos(p){
  const ll=[p.coords.latitude,p.coords.longitude]; accM=p.coords.accuracy||0;
  if(!me){me=L.circleMarker(ll,{radius:7,color:'#fff',weight:2,fillColor:'#1e90ff',fillOpacity:1}).addTo(map);
    accCircle=L.circle(ll,{radius:accM,color:'#1e90ff',weight:1,fillOpacity:.08}).addTo(map);}
  else{me.setLatLng(ll);accCircle.setLatLng(ll).setRadius(accM);}
  status.textContent='GPS ±'+Math.round(accM)+' m';
  pushTrack(p.coords.latitude,p.coords.longitude);
  updateNearest(p.coords.latitude,p.coords.longitude);
  if(first){map.setView(ll,17);first=false;}
}
function onErr(e){status.textContent='GPS unavailable ('+e.message+')';}
if('geolocation' in navigator){
  navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
} else {status.textContent='No geolocation support';}
document.getElementById('gps').onclick=()=>{if(me)map.setView(me.getLatLng(),18);};

// ---- save area offline ----
function lon2x(lon,z){return Math.floor((lon+180)/360*Math.pow(2,z));}
function lat2y(lat,z){const r=lat*Math.PI/180;
  return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z));}
async function saveArea(){
  const off=document.getElementById('offline');
  if(!('caches' in window)){off.textContent='offline cache unsupported';return;}
  const cache=await caches.open('alluviai-tiles-v1');
  const pad=0.002;  // ~200m beyond the model area so you can approach it
  const s=S-pad,n=N+pad,w=W-pad,e=E+pad;
  const urls=[];
  for(let z=13;z<=18;z++){
    const x0=lon2x(w,z),x1=lon2x(e,z),y0=lat2y(n,z),y1=lat2y(s,z);
    for(let x=x0;x<=x1;x++)for(let y=y0;y<=y1;y++)
      urls.push(TILEURL.replace('{z}',z).replace('{x}',x).replace('{y}',y));
  }
  off.textContent='Downloading 0/'+urls.length+' tiles…';
  let done=0;
  for(const u of urls){
    try{const r=await fetch(u,{mode:'no-cors'});await cache.put(u,r);}catch(err){}
    done++; if(done%15===0||done===urls.length) off.textContent='Downloading '+done+'/'+urls.length+' tiles…';
  }
  off.innerHTML='<b>Saved '+urls.length+' tiles.</b> Works offline now.';
}

// ---- field log ----
const LS='alluviai_finds';
let finds=JSON.parse(localStorage.getItem(LS)||'[]');
const findMarkers={};
function outColor(o){return o==='Nothing'||o==='None'?'#888':o==='Nugget'?'#ffd700':'#2ecc40';}
function addFindMarker(f){
  const m=L.circleMarker([f.lat,f.lon],{radius:6,color:'#fff',weight:1,fillColor:outColor(f.outcome),fillOpacity:1})
   .addTo(findLayer).bindPopup('<b>'+f.outcome+'</b><br>'+new Date(f.ts).toLocaleString()
     +(f.pans?'<br>'+f.pans+' pans':'')+(f.notes?'<br>'+f.notes:''));
  findMarkers[f.ts]=m;
}
finds.forEach(addFindMarker);
function refreshCount(){document.getElementById('cnt').textContent=finds.length;}
refreshCount();
function deleteFind(ts){
  finds=finds.filter(x=>x.ts!==ts); localStorage.setItem(LS,JSON.stringify(finds));
  if(findMarkers[ts]){findLayer.removeLayer(findMarkers[ts]);delete findMarkers[ts];}
  refreshCount(); renderList();
}
function renderList(){
  const el=document.getElementById('listItems');
  el.innerHTML=finds.length?finds.slice().reverse().map(f=>'<div><span>'+f.outcome
    +' · #'+(f.near_spot||'?')+' · '+new Date(f.ts).toLocaleTimeString()
    +'</span><a href="#" onclick="deleteFind('+f.ts+');return false">✕</a></div>').join('')
    :'<div>No finds yet.</div>';
}
function toggleList(){const p=document.getElementById('listPanel');
  p.style.display=(p.style.display==='block')?'none':'block';
  if(p.style.display==='block')renderList();}

let logPos=null;
function openLog(){
  logPos = me ? me.getLatLng() : map.getCenter();
  document.getElementById('logwhere').textContent =
    (me?'at your GPS position':'at map centre (no GPS)')+' · '
    +logPos.lat.toFixed(5)+', '+logPos.lng.toFixed(5);
  document.getElementById('pans').value=''; document.getElementById('notes').value='';
  document.getElementById('modal').style.display='block';
}
function closeLog(){document.getElementById('modal').style.display='none';}
function saveLog(outcome){
  if(!logPos)return;
  const r=nearestPeak(logPos.lat,logPos.lng);
  const f={ts:Date.now(),lat:+logPos.lat.toFixed(6),lon:+logPos.lng.toFixed(6),
    acc:me?Math.round(accM):'',outcome:outcome,
    pans:document.getElementById('pans').value,
    notes:(document.getElementById('notes').value||'').replace(/[\r\n,]/g,' '),
    near_spot:r.p?r.p.n:'',near_m:r.p?Math.round(r.d):'',
    near_top_pct:r.p?Math.max(1,100-r.p.pct):''};
  finds.push(f); localStorage.setItem(LS,JSON.stringify(finds));
  addFindMarker(f); refreshCount(); closeLog();
}
function exportCSV(){
  if(!finds.length){alert('No finds logged yet.');return;}
  const cols=['timestamp_iso','lat','lon','gps_acc_m','outcome','pans','near_spot','near_m','near_top_pct','notes'];
  const rows=finds.map(f=>[new Date(f.ts).toISOString(),f.lat,f.lon,f.acc,f.outcome,f.pans,
    f.near_spot,f.near_m,f.near_top_pct,'"'+(f.notes||'')+'"'].join(','));
  const csv=cols.join(',')+'\n'+rows.join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='alluviai_finds.csv'; a.click();
}
</script>
